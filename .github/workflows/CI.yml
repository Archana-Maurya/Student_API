name: Run Tests

on:
  push:
    branches:
      - main
      - feature/api

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install fastapi uvicorn sqlalchemy pytest httpx

    - name: Run tests
      run: |
        pytest